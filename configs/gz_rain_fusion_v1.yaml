exp_name: gz_rain_da_deformmamba_fusion_v1
data_path: 20152024.xlsx

target_city: "__all__"

lookback_L: 90
horizon_H: 7
use_time_features: true
neighbor_mode: "all"
topk: 6

split:
  train_years: [2015,2016,2017,2018,2019,2020,2021]
  val_years:   [2022]
  test_years:  [2023,2024]

gmm:
  k_min: 2
  k_max: 6
  random_state: 42

model:
  d_model: 128
  deform_layers: 2
  deform_heads: 8
  deform_groups: 4
  deform_kernel: 7
  conbimamba_layers: 3

  # 三模块缝合开关：在时间分支之外，增加空间 Deform + BiMamba 分支
  spatial_deform_enabled: true
  spatial_deform_layers: 1
  spatial_deform_heads: 4
  spatial_deform_groups: 4
  spatial_deform_kernel: 5

  dropout: 0.1
  require_mamba: false

train:
  seed: 42
  batch_size: 64
  num_workers: 0
  lr: 0.0008
  weight_decay: 0.0001
  epochs: 15
  grad_clip: 1.0
  use_amp: true
  early_stopping:
    enabled: true
    patience: 5
    min_delta: 0.0

domain_adv:
  enabled: true
  beta: 0.15
  grl_gamma: 10.0
  max_iter: 20000
  domain_hidden: 64

task:
  mode: "quantile"
  quantiles: [0.05, 0.5, 0.95]
  use_huber_pinball: true
  huber_delta: 1.0
  target_transform: "log1p"
  asinh_scale: 10.0
  rain_weighting:
    enabled: true
    thresholds: [0.1, 10.0, 25.0, 50.0]
    weights: [1.0, 1.2, 2.0, 3.0, 5.0]
