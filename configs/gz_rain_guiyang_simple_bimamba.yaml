exp_name: gz_rain_guiyang_simple_bimamba
data_path: 20152024.xlsx

target_city: "贵阳市"

lookback_L: 90
horizon_H: 1
use_time_features: true
feature_mode: "target_only"
neighbor_mode: "all"
topk: 0

split:
  train_years: [2015,2016,2017,2018,2019,2020,2021,2022]
  val_years: [2023]
  test_years: [2024]

gmm:
  k_min: 2
  k_max: 4
  random_state: 42

model:
  name: "simple_bimamba"
  d_model: 128
  conbimamba_layers: 3
  dropout: 0.1
  require_mamba: true

train:
  seed: 42
  batch_size: 64
  num_workers: 0
  lr: 0.0008
  weight_decay: 0.0001
  epochs: 30
  grad_clip: 1.0
  use_amp: true
  amp_dtype: "fp16"
  scheduler:
    type: "cosine"
    t_max: 30
    eta_min: 0.00005
  early_stopping:
    enabled: true
    patience: 6
    min_delta: 0.0

domain_adv:
  enabled: false
  beta: 0.0
  grl_gamma: 10.0
  max_iter: 20000
  domain_hidden: 64

task:
  mode: "quantile"
  quantiles: [0.1, 0.5, 0.9]
  use_huber_pinball: true
  huber_delta: 1.0
  target_transform: "log1p"
  asinh_scale: 10.0
  rain_weighting:
    enabled: true
    thresholds: [0.1, 10.0, 25.0, 50.0]
    weights: [1.0, 1.2, 2.0, 3.0, 5.0]
